<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Magazine</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="create-magazine.html">Create</a>
        <a href="magazine.html">Reader</a>
    </nav>

    <div class="container">

        <h1>Create Magazine</h1>

        <form class="card" id="magazineForm">

            <label>Magazine Title</label>
            <input type="text" id="title" required>

            <label>Description</label>
            <textarea rows="4" id="description"></textarea>

            <label>Theme</label>

            <select id="magazineTheme">
                <option value="scrapbook">Scrapbook</option>
                <option value="vintage">Vintage</option>
                <option value="modern">Modern</option>
            </select>

            <label>Cover Image URL</label>
            <input type="text" id="cover">

            <button type="submit">
                Create
            </button>

        </form>

    </div>

    <script src="script.js"></script>

</body>

</html>
