<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Page</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="magazine.html">Reader</a>
    </nav>

    <div class="container">

        <h1 id="pageHeading">Create Page</h1>

        <form class="card" id="pageForm">

            <label>Page Title</label>
            <input type="text" id="pageTitle">

            <label>Page Content</label>
            <textarea id="pageContent"></textarea>

            <label>Image URL</label>
            <input type="text" id="pageImage">

            <label>Song Link</label>
            <input type="text" id="pageSong">

            <button type="submit" id="pageSubmitBtn">
                Add Page
            </button>

        </form>

    </div>

    <script src="script.js"></script>

</body>
